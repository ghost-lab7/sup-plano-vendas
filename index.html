  var SS_KEY="sup_pw";
  function b64ToBytes(b64){var bin=atob(b64);var len=bin.length;var out=new Uint8Array(len);for(var i=0;i<len;i++){out[i]=bin.charCodeAt(i);}return out;}
  async function decrypt(pw){
    var blob=b64ToBytes(PAYLOAD);
    var salt=blob.slice(0,16);
    var iv=blob.slice(16,28);
    var ct=blob.slice(28);
    var enc=new TextEncoder();
    var baseKey=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
    var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:200000,hash:"SHA-256"},baseKey,{name:"AES-GCM",length:256},false,["decrypt"]);
    var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv},key,ct);
    return new TextDecoder().decode(pt);
  }
  function render(htmlString){
    document.open();
    document.write(htmlString);
    document.close();
  }
  async function tryUnlock(pw,fromUser){
    var err=document.getElementById("err");
    try{
      var htmlString=await decrypt(pw);
      try{sessionStorage.setItem(SS_KEY,pw);}catch(e){}
      render(htmlString);
    }catch(e){
      if(fromUser){
        if(err)err.textContent="Senha incorreta";
        try{sessionStorage.removeItem(SS_KEY);}catch(_){}
      }
    }
  }
  function init(){
    var form=document.getElementById("gate-form");
    var pw=document.getElementById("pw");
    form.addEventListener("submit",function(ev){ev.preventDefault();tryUnlock(pw.value,true);});
    // auto-remember within session
    var saved=null;
    try{saved=sessionStorage.getItem(SS_KEY);}catch(e){}
    if(saved){tryUnlock(saved,false);}
    else{pw.focus();}
  }
  if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",init);}else{init();}
})();
